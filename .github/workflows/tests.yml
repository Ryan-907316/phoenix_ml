# Runs the pytest suite on every push and pull request, on both Linux and
# Windows (the primary development platform). A red X on a commit means a
# checked behaviour broke: see tests/README.md for how to read failures.
name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # Headless-safe plotting everywhere; tests never open a display.
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest
